name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: habitame_test
          POSTGRES_USER: habitame
          POSTGRES_PASSWORD: habitame
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Checkstyle
        run: ./mvnw checkstyle:check -q

      - name: Test & Coverage
        run: ./mvnw verify -q
        env:
          SPRING_PROFILES_ACTIVE: test
          DB_URL: jdbc:postgresql://localhost:5432/habitame_test
          DB_USER: habitame
          DB_PASS: habitame
          JWT_SECRET: clave-secreta-para-tests-de-ci-minimo-32-chars

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 7

      - name: Docker build check
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
