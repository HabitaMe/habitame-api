spring:
  application:
    name: habitame-api

  datasource:
    url: jdbc:postgresql://localhost:5432/habitame_db
    username: habitame
    password: habitame
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:change-me-in-dev-to-something-longer-and-random-please!}
  expiration: 3600000
